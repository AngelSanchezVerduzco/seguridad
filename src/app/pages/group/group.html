<style>
  .group-header {
    margin-bottom: 1.5rem;
  }

  .group-title {
    font-size: 1.6rem;
    font-weight: 650;
    color: #0f172a;
    margin: 0;
  }

  .group-subtitle {
    margin: 0.25rem 0 0;
    font-size: 0.9rem;
    color: #64748b;
  }

  .group-section {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .group-total {
    background: #ffffff;
    border-radius: 16px;
    padding: 1.5rem 1.75rem;
    box-shadow: 0 14px 35px rgba(15, 23, 42, 0.12);
    max-width: 360px;
  }

  .group-total-label {
    font-size: 0.9rem;
    font-weight: 600;
    color: #64748b;
    margin: 0 0 0.5rem;
  }

  .group-total-value {
    font-size: 2rem;
    font-weight: 700;
    color: #0f172a;
  }

  .group-table {
    background: #ffffff;
    border-radius: 16px;
    padding: 1rem;
    box-shadow: 0 14px 35px rgba(15, 23, 42, 0.12);
    max-width: 1000px;
  }
</style>

<header class="group-header">
  <h1 class="group-title">Group</h1>
  <p class="group-subtitle">Vista de grupos</p>
</header>

<section class="group-section">
  <div class="group-total">
    <p class="group-total-label">Total</p>
    <p class="group-total-value">{{ groupStore.total() }}</p>
  </div>

  <div class="group-table">
    <p-table
      [value]="groupStore.groups()"
      [paginator]="true"
      [rows]="8"
      [rowsPerPageOptions]="[8, 15, 25]"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Nivel</th>
          <th>Autor</th>
          <th>Nombre</th>
          <th>Integrantes</th>
          <th>Tickets</th>
          <th>Descripción</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-g>
        <tr>
          <td>{{ g.nivel }}</td>
          <td>{{ g.autor }}</td>
          <td>{{ g.nombre }}</td>
          <td>{{ g.integrantes }}</td>
          <td>{{ g.tickets }}</td>
          <td style="max-width: 520px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis">
            {{ g.descripcion }}
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" style="color: #64748b">Aún no hay grupos creados en `/group/crud`.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</section>
