<style>
  .crud-header {
    margin-bottom: 1.25rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .crud-title {
    font-size: 1.6rem;
    font-weight: 650;
    color: #0f172a;
    margin: 0;
  }

  .crud-subtitle {
    margin: 0.25rem 0 0;
    font-size: 0.9rem;
    color: #64748b;
  }

  .crud-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 1.25rem 1.25rem;
    box-shadow: 0 14px 35px rgba(15, 23, 42, 0.12);
  }

  .w-full,
  .w-full input,
  .w-full textarea {
    width: 100%;
    box-sizing: border-box;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .form-grid .span-2 {
    grid-column: span 2;
  }

  .field label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #475569;
    margin-bottom: 0.35rem;
  }

  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.75rem;
    margin-top: 1rem;
  }

  @media (max-width: 700px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
    .form-grid .span-2 {
      grid-column: span 1;
    }
  }
</style>

<header class="crud-header">
  <div>
    <h1 class="crud-title">Group CRUD</h1>
    <p class="crud-subtitle">Solo accesible entrando a la ruta `/group/crud`</p>
  </div>

  <button pButton type="button" label="Nuevo group" icon="pi pi-plus" (click)="nuevo()"></button>
</header>

<section class="crud-card">
  <p-table [value]="groupStore.groups()" [paginator]="true" [rows]="8" [rowsPerPageOptions]="[8, 15, 25]">
    <ng-template pTemplate="header">
      <tr>
        <th>Nivel</th>
        <th>Autor</th>
        <th>Nombre</th>
        <th>Integrantes</th>
        <th>Tickets</th>
        <th>Descripción</th>
        <th style="width: 150px"></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-g>
      <tr>
        <td>{{ g.nivel }}</td>
        <td>{{ g.autor }}</td>
        <td>{{ g.nombre }}</td>
        <td>{{ g.integrantes }}</td>
        <td>{{ g.tickets }}</td>
        <td style="max-width: 420px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis">
          {{ g.descripcion }}
        </td>
        <td>
          <div style="display: flex; gap: 0.5rem">
            <button
              pButton
              type="button"
              icon="pi pi-pencil"
              severity="secondary"
              (click)="editar(g)"
            ></button>
            <button
              pButton
              type="button"
              icon="pi pi-trash"
              severity="danger"
              (click)="eliminar(g)"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" style="color: #64748b">No hay grupos aún.</td>
      </tr>
    </ng-template>
  </p-table>
</section>

<p-dialog
  header="{{ editing ? 'Editar group' : 'Nuevo group' }}"
  [(visible)]="dialogVisible"
  [modal]="true"
  [draggable]="false"
  [style]="{ width: 'min(720px, 95vw)' }"
>
  <form [formGroup]="form" (ngSubmit)="guardar()">
    <div class="form-grid">
      <div class="field">
        <label>Nivel</label>
        <input pInputText class="w-full" formControlName="nivel" placeholder="1" />
      </div>

      <div class="field">
        <label>Autor</label>
        <input pInputText class="w-full" formControlName="autor" placeholder="x" />
      </div>

      <div class="field span-2">
        <label>Nombre</label>
        <input pInputText class="w-full" formControlName="nombre" placeholder="x" />
      </div>

      <div class="field">
        <label>Integrantes</label>
        <p-inputNumber class="w-full" formControlName="integrantes" [min]="0" [useGrouping]="false" />
      </div>

      <div class="field">
        <label>Tickets</label>
        <p-inputNumber class="w-full" formControlName="tickets" [min]="0" [useGrouping]="false" />
      </div>

      <div class="field span-2">
        <label>Descripción</label>
        <textarea
          pTextarea
          class="w-full"
          rows="3"
          formControlName="descripcion"
          placeholder="x"
        ></textarea>
      </div>
    </div>

    <div class="dialog-actions">
      <button
        pButton
        type="button"
        label="Cancelar"
        severity="secondary"
        (click)="dialogVisible = false"
      ></button>
      <button pButton type="submit" label="Guardar"></button>
    </div>
  </form>
</p-dialog>
